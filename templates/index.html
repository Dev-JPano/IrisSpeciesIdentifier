<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Model Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- Theme Toggle Switch -->
    <div class="theme-toggle">
        <span class="icon sun">☀️</span>
        <span class="icon moon">🌙</span>
    </div>

    <header>
        <h1>Iris Flower Species Prediction</h1>
    </header>

    <main class="container">
        <div class="card">
            <h2>Enter Flower Measurements</h2>
            <form method="POST">
                <input type="number" step="any" name="sepal_length" placeholder="Sepal Length (cm)" required>
                <input type="number" step="any" name="sepal_width" placeholder="Sepal Width (cm)" required>
                <input type="number" step="any" name="petal_length" placeholder="Petal Length (cm)" required>
                <input type="number" step="any" name="petal_width" placeholder="Petal Width (cm)" required>
                <button type="submit">Predict</button>
            </form>

            {% if prediction %}
            <div class="result">
                Predicted Species: <strong>{{ prediction }}</strong>
            </div>
            {% endif %}
        </div>
    </main>

    <footer>
        <p>Developed by: <code>Harkov Corporation</code></p>
    </footer>

    <!-- Optional Animated Background -->
    <canvas id="flowerCanvas"></canvas>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
